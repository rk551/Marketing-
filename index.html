async function imgData(f){let raw=await new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});return new Promise(r=>{let im=new Image();im.onload=()=>{let max=2100,ra=Math.min(1,max/Math.max(im.width,im.height)),w=Math.round(im.width*ra),h=Math.round(im.height*ra),c=document.createElement('canvas');c.width=w;c.height=h;let x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,w,h);x.drawImage(im,0,0,w,h);r(c.toDataURL('image/jpeg',.86))};im.onerror=()=>r(raw);im.src=raw})}
