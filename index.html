function header(){let s=state.settings;return`<div class="head"><div class="left">${esc(s.brand)}</div><div class="asWrap"><img class="asLogo" src="${AS_LOGO}"></div><div class="hContact">${esc(s.contact).replace(/\n/g,'<br>')}</div></div>`}function bull(){return`<div class="bull"><img src="${BULL}"></div>`}
function coverPage(){let c=state.cover,s=state.settings;return`<section class="a4">${bull()}<div class="safe">${header()}<div class="cover"><div class="heroLine"><div><div class="eye">${esc(c.campaign)}</div><h1 class="coverTitle">${esc(c.title)}</h1><p class="lead">${esc(c.lead)}</p></div><div class="brandStamp"><b>BLOC73 Machinery</b><span>Maschinenvertrieb mit technischem Verständnis.</span></div></div><div class="editorial"><div class="editorialItem"><div class="num">01</div><b>Maschinen</b><p>Starke Lösungen für Fleischerei, Produktion, Handel und Großküche.</p></div><div class="editorialItem"><div class="num">02</div><b>Service</b><p>Wartung, Reparatur, Modernisierung und Retrofit mit technischem Blick.</p></div><div class="editorialItem"><div class="num">03</div><b>Beratung</b><p>Klare Einordnung, ehrliche Empfehlung und kurze Wege bis zur Anfrage.</p></div></div><div class="statement"><div><strong>Technisch sauber. Vertrieblich klar.</strong><p>${esc(c.statement)}</p></div><div><img class="qr" src="${qrUrl(s.qr)}"><div class="qrText">${esc(s.qrText)}</div></div></div><div class="foot"><div class="contactBlock"><b>Direkter Kontakt für Maschinen und Projekte</b><br>${esc(s.contact).replace(/\n/g,'<br>')}</div><div></div></div></div></div></section>`}
function parseSpecs(t){let a=lines(t).map(l=>{let p=l.split(/[:;|]\s*/);if(p.length<2)p=l.split(/\s[-–—]\s/);return p.length>=2?{k:clean(p.shift()),v:clean(p.join(' '))}:{k:'Daten',v:clean(l)}}).filter(r=>r.k&&r.v).slice(0,12);return a.length?a:[{k:'Technische Daten',v:'laut Herstellerangaben'}]}
function machinePage(p,i){let img=p.image||p.imageUrl;let specs=parseSpecs(p.specs).map(r=>`<tr><td>${esc(r.k)}</td><td>${esc(r.v)}</td></tr>`).join('');let bens=lines(p.benefits).slice(0,6).map(b=>`<div class="benefit">${esc(b)}</div>`).join('');return`<section class="a4">${bull()}<div class="safe">${header()}<div class="badge">Seite ${i+1}</div><div class="machine"><div class="hero"><div class="imageBox">${img?`<img class="machineImg ${p.fit==='cover'?'cover':''}" style="--x:${+p.imgX||0}px;--y:${+p.imgY||0}px;--z:${+p.zoom||1}" src="${esc(img)}">`:'<div class="placeholder">Maschinenbild hochladen oder Bild-URL einfügen.<br>Der Rahmen bleibt gleich.</div>'}</div><div><div class="kicker">${esc(p.kicker)}</div><h1 class="mTitle">${esc(p.title)}</h1><p class="mSub">${esc(p.subtitle)}</p><p class="desc">${esc(p.description)}</p><div class="chips"><span class="chip">Technische Daten laut Hersteller</span>${p.availability?`<span class="chip">${esc(p.availability)}</span>`:''}</div>${p.price?`<div class="price"><b>Preis / Aktion</b><strong>${esc(p.price)}</strong></div>`:''}</div></div><div class="bodyGrid"><div class="block"><h3>Technische Daten</h3><table class="spec">${specs}</table></div><div class="block"><h3>Nutzen im Betrieb</h3><div class="benefits">${bens}</div></div></div><div class="mFoot"><div><div class="cta"><b>Direkt anfragen:</b> ${esc(state.settings.contact).replace(/\n/g,' · ')}</div><div class="source">${esc(p.note||'Technische Daten laut Herstellerangaben.')}</div></div><div class="smallQr"><img src="${qrUrl(state.settings.qr)}"><div>${esc(state.settings.qrText)}</div></div></div></div></div></section>`}
function renderCanvas(){$('canvas').innerHTML=state.pages.map((p,i)=>`<div class="wrap">${p.type==='cover'?coverPage():machinePage(p,i)}</div>`).join('')}function fit(){let small=matchMedia('(pointer:coarse)').matches||innerWidth<1100;let pagePx=210*96/25.4;let avail=Math.max(320,document.querySelector('.preview').clientWidth-12);let sc=small?Math.min(1,Math.max(.58,avail/pagePx)):1;document.documentElement.style.setProperty('--scale',sc)}async function imgData(f){let raw=await new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});return new Promise(r=>{let im=new Image();im.onload=()=>{let max=2100,ra=Math.min(1,max/Math.max(im.width,im.height)),w=Math.round(im.width*ra),h=Math.round(im.height*ra),c=document.createElement('canvas');c.width=w;c.height=h;let x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,w,h);x.drawImage(im,0,0,w,h);r(c.toDataURL('image/jpeg',.86))};im.onerror=()=>r(raw);im.src=raw})}
['brand','accent','contact','qr','qrText'].forEach(id=>bind(id,v=>state.settings[id]=v));bind('campaign',v=>state.cover.campaign=v);bind('coverTitle',v=>state.cover.title=v);bind('coverLead',v=>state.cover.lead=v);bind('statement',v=>state.cover.statement=v);['imageUrl','fit','zoom','imgX','imgY','kicker','title','subtitle','description','specs','benefits','price','availability','note'].forEach(id=>bind(id,v=>{let p=current();if(!p)return;p[id]=['zoom','imgX','imgY'].includes(id)?+v:v;if(id==='title')p.name=v}));$('machineImage').onchange=async e=>{let p=current(),f=e.target.files[0];if(p&&f){p.image=await imgData(f);p.imageUrl='';render();save()}};tap('add',()=>{state.pages.push(mt());state.selected=state.pages.length-1;render();save()});tap('del',()=>{if(state.selected){state.pages.splice(state.selected,1);state.selected=Math.max(0,state.selected-1);render();save()}});tap('dup',()=>{let p=current();if(p){let c=JSON.parse(JSON.stringify(p));c.name=(c.name||c.title||'Maschine')+' Kopie';state.pages.splice(state.selected+1,0,c);state.selected++;render();save()}});tap('save',save);tap('print1',()=>print());tap('print2',()=>print());tap('reset',()=>{if(confirm('Alles zurücksetzen?')){localStorage.removeItem(KEY);state=def();render();save()}});tap('exportJson',()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='BLOC73_Prospekt_Daten.json';a.click()});tap('importJsonBtn',()=>$('importJson').click());$('importJson').onchange=async e=>{let f=e.target.files[0];if(!f)return;state=migrate(JSON.parse(await f.text()));render();save()};addEventListener('resize',fit);addEventListener('orientationchange',()=>setTimeout(fit,300));addEventListener('beforeprint',()=>document.documentElement.style.setProperty('--scale','1'));addEventListener('afterprint',fit);render();
</script>
